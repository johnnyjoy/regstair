name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test and build frontend
        run: |
          npm test
          npm run typecheck
          npm run build

  test:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Build embedded frontend
        run: |
          npm ci
          npm run build

      - name: Verify dependency checksums
        run: |
          test -f go.sum || { echo "go.sum must be committed" >&2; exit 1; }
          go mod download
          go mod verify

      - name: Test
        run: go test ./...

  image-smoke:
    name: Build and smoke-test image
    needs: [test, frontend-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: regstair-ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build and run OCI gateway smoke test
        run: ./scripts/compose-smoke.sh

      - name: Show service state and logs after failure
        if: failure()
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" ps -a
          docker compose -p "$COMPOSE_PROJECT_NAME" logs --no-color

      - name: Remove test environment
        if: always()
        run: docker compose -p "$COMPOSE_PROJECT_NAME" down -v --remove-orphans
