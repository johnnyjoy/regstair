name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  image-smoke:
    name: Build and smoke-test image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: regstair-ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and run OCI gateway smoke test
        run: ./scripts/compose-smoke.sh

      - name: Show service state and logs after failure
        if: failure()
        run: |
          docker compose -p "$COMPOSE_PROJECT_NAME" ps -a
          docker compose -p "$COMPOSE_PROJECT_NAME" logs --no-color

      - name: Remove test environment
        if: always()
        run: docker compose -p "$COMPOSE_PROJECT_NAME" down -v --remove-orphans
