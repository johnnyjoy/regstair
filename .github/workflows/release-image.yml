name: Release image

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify dependencies and run tests
        run: |
          test -f go.sum || { echo "go.sum must be committed" >&2; exit 1; }
          go mod download
          go mod verify
          go test ./...

      - name: Run image integration test
        env:
          COMPOSE_PROJECT_NAME: regstair-release-verify
        run: ./scripts/compose-smoke.sh

      - name: Show service state and logs after failure
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: regstair-release-verify
        run: |
          docker compose -f docker-compose.yml -f compose.fixture.yml -p "$COMPOSE_PROJECT_NAME" ps -a
          docker compose -f docker-compose.yml -f compose.fixture.yml -p "$COMPOSE_PROJECT_NAME" logs --no-color

      - name: Remove test environment
        if: always()
        env:
          COMPOSE_PROJECT_NAME: regstair-release-verify
        run: docker compose -f docker-compose.yml -f compose.fixture.yml -p "$COMPOSE_PROJECT_NAME" down -v --remove-orphans

  build:
    name: Build ${{ matrix.platform }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
          - platform: linux/arm/v7
            suffix: arm-v7
          - platform: linux/ppc64le
            suffix: ppc64le
          - platform: linux/s390x
            suffix: s390x
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.title=Regstair
            org.opencontainers.image.description=Policy-driven OCI registry gateway
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=release-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.suffix }}
          provenance: mode=max
          sbom: true

  manifest:
    name: Publish multi-architecture manifest
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version manifest
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE_NAME:$GITHUB_REF_NAME" \
            "$IMAGE_NAME:$GITHUB_REF_NAME-amd64" \
            "$IMAGE_NAME:$GITHUB_REF_NAME-arm64" \
            "$IMAGE_NAME:$GITHUB_REF_NAME-arm-v7" \
            "$IMAGE_NAME:$GITHUB_REF_NAME-ppc64le" \
            "$IMAGE_NAME:$GITHUB_REF_NAME-s390x"

      - name: Inspect published manifest
        run: docker buildx imagetools inspect "$IMAGE_NAME:$GITHUB_REF_NAME"
